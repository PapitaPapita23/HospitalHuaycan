spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/hospital_utp?currentSchema=hospital_hc
    username: postgres
    password: ROOT
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
server:
  port: 8080
